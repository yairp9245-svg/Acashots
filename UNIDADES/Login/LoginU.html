<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cultura Empresarial</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
display:flex;
align-items:center;
background:#0f172a;
color:white;
padding:15px 30px;
position:relative;
}

.menu-btn{
font-size:28px;
cursor:pointer;
}

.titulo{
font-size:30px;
font-weight:bold;
position:absolute;
left:50%;
transform:translateX(-50%);
}

.menu{
position:fixed;
left:-230px;
top:0;
width:230px;
height:100%;
background:#111827;
transition:0.3s;
padding-top:20px;
}

.menu.abierto{
left:0;
}

.cerrar{
color:white;
font-size:25px;
cursor:pointer;
margin-left:180px;
}

.menu a{
display:block;
color:white;
padding:15px;
text-decoration:none;
}

.menu a:hover{
background:#374151;
}

.contenedor{
padding:50px;
text-align:center;
}

.unidades{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.cuadro{
background:white;
width:200px;
padding:15px;
border-radius:10px;
box-shadow:0px 5px 10px rgba(0,0,0,0.2);
}

.cuadro img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

footer{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin-top:80px;
}

</style>

</head>

<body>

<div id="menu" class="menu">

<div class="cerrar" onclick="cerrarMenu()">✖</div>

<a href="../../index.html">Inicio</a>
<a href="LoginEvi.html">Evidencias</a>

</div>

<header>

<div class="menu-btn" onclick="abrirMenu()">☰</div>

<div class="titulo">Cultura Empresarial</div>

</header>

<div class="contenedor">

<h2>UNIDADES</h2>

<div class="unidades">

<a href="../Unidad1/Temas1.html">
<div class="cuadro">
<img src="../../imagenes/u1.jpeg">
<h3>Unidad 1</h3>
</div>
</a>

</div>

</div>

<footer>
Página de Cultura Empresarial
</footer>

<script>

function abrirMenu(){
document.getElementById("menu").classList.add("abierto");
}

function cerrarMenu(){
document.getElementById("menu").classList.remove("abierto");
}

</script>

</body>
</html>
