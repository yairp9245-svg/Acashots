<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabajos en Clase</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

/* HEADER */

header{
background:#0f172a;
color:white;
padding:20px;
position:relative;
text-align:center;
}

.titulo{
font-size:28px;
font-weight:bold;
}

/* BOTON MENU */

.menu-btn{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
font-size:30px;
cursor:pointer;
}

/* Boton */
.boton{
display:block;
width:fit-content;
margin:30px auto;
padding:10px 20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:6px;
}

/* MENU LATERAL */

.menu{
position:fixed;
left:-230px;
top:0;
width:230px;
height:100%;
background:#111827;
transition:0.3s;
padding-top:20px;
}

.menu.abierto{
left:0;
}

/* BOTON CERRAR */

.cerrar{
color:white;
font-size:25px;
cursor:pointer;
margin-left:180px;
margin-bottom:20px;
}

/* LINKS MENU */

.menu a{
display:block;
color:white;
padding:15px 20px;
text-decoration:none;
font-size:18px;
}

.menu a:hover{
background:#374151;
}

/* CONTENEDOR TARJETAS */

.contenedor{
display:flex;
justify-content:center;
gap:40px;
padding:60px;
flex-wrap:wrap;
}

/* TARJETAS */

.tarjeta{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0px 5px 15px rgba(0,0,0,0.2);
  text-align:center;
  transition:0.3s;
  width: fit-content;      
  max-width: 300px;        
}

.tarjeta:hover{
transform:translateY(-5px);
}

/* TITULO TARJETA */

.tarjeta h3{
margin-bottom:15px;
}

/* CONTENEDOR DE IMÁGENES */

.imagen{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

/* CUADRO DE CADA IMAGEN */

.marco{
display:inline-block;
padding:5px;
border:2px solid #ddd;
border-radius:10px;
background:white;
width:fit-content;
}

/* IMAGEN */

.marco img{
  max-width: 250px;  /* controla tamaño */
  height:auto;
  border-radius:8px;
  display:block;
}

</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="menu">
<div class="cerrar" onclick="cerrarMenu()">✖</div>
<a href="../../index.html">Inicio</a>
<a href="../Login/LoginU.html">Unidades</a>
<a href="#">Contacto</a>
</div>

<!-- HEADER -->
<header>
<div class="menu-btn" onclick="abrirMenu()">☰</div>
<div class="titulo">Trabajos en Clase</div>
</header>

<!-- TARJETAS -->
<div class="contenedor">

<div class="tarjeta">
<h3>PRODUCCION EN PROCESO</h3>
<div class="imagen">
<div class="marco"><img src="../../imagenes/PEPCRIS.jpeg"></div>
<div class="marco"><img src="../../imagenes/PEPCARLOS.jpeg"></div>
</div>
</div>

<div class="tarjeta">
<h3>PROCESO DE PRODUCCION DE LA EMPRESA</h3>
<div class="imagen">
<div class="marco"><img src="../../imagenes/PDPDLE.jpeg"></div>
</div>
</div>

<div class="tarjeta">
<h3>MAPA CONCEPTUAL</h3>
<div class="imagen">
<div class="marco"><img src="../../imagenes/MAPAC3.jpeg"></div>
<div class="marco"><img src="../../imagenes/MAPAC32.jpeg"></div>
</div>
</div>

<div class="tarjeta">
<h3>MAPA MENTAL</h3>
<div class="imagen">
<div class="marco"><img src="../../imagenes/MAPAM3.jpeg"></div>
</div>
</div>

<div class="tarjeta">
<h3>INVESTIGACIÓN CONCEPTOS</h3>
<div class="imagen">
<div class="marco"><img src="../../imagenes/INVCCRIS1.jpeg"></div>
<div class="marco"><img src="../../imagenes/ICCRIS2.jpeg"></div>
<div class="marco"><img src="../../imagenes/ICCARLOS.jpeg"></div>
<div class="marco"><img src="../../imagenes/ICCARLOS2.jpeg"></div>
<div class="marco"><img src="../../imagenes/ICCARLOS3.jpeg"></div>
</div>
</div>

</div>

<a class="boton" href="../Login/LoginEvi.html">Volver a Evidencias</a>

<script>
function abrirMenu(){
document.getElementById("menu").classList.add("abierto");
}

function cerrarMenu(){
document.getElementById("menu").classList.remove("abierto");
}
</script>

</body>
</html>
